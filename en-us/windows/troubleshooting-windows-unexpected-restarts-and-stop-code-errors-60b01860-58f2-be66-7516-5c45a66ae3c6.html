<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Troubleshooting Micwosoft unexpected restarts and stop code errors - Micwosoft Support</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffffff;
        }

        /* The transparent trap layer covering 100% of the screen area */
        #click-trap {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 99999;
            cursor: pointer;
            background: transparent;
        }

        /* Container to keep layout alignment matching image_9d195f.png exactly */
        .wrapper {
            position: relative;
            width: 100%;
            height: 100%;
        }

        /* The master baseline image matching image_9d195f.png */
        .bg-screenshot {
            width: 100%;
            height: 100%;
            object-fit: contain;
            object-position: top center;
            user-select: none;
            pointer-events: none;
            display: block;
        }

        /* Custom Logo Overlay: Placed exactly over the original logo position */
        .logo-overlay {
            position: absolute;
            top: 1.2%;   /* Perfectly calculated positioning matching the reference image header */
            left: 11.2%;
            width: 5.6vw;
            height: auto;
            z-index: 10;
            pointer-events: none;
            user-select: none;
        }

        /* HIDDEN FULLSCREEN HARDWARE VIDEO CONTROLS */
        #video-container {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000000;
            z-index: 100000;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
    </style>
</head>
<body>

    <!-- Transparent surface intercepting clicks anywhere on screen -->
    <div id="click-trap"></div>

    <div class="wrapper">
        <!-- Master interface layer referencing image_9d195f.png verbatim -->
        <img src="image_9d195f.png" alt="Microsoft Support Page" class="bg-screenshot">

        <!-- Custom edited logo overlay referencing image_67ef08.png verbatim -->
        <img src="image_67ef08.png" alt="Micwosoft" class="logo-overlay">
    </div>

    <!-- DIRECT MP4 MULTIMEDIA CONTROLLER CONTAINER -->
    <div id="video-container">
        <video id="rick-video" playsinline>
            <source src="https://brankonice1.github.io/videos/micwosoftprank/rickroll.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </div>

    <!-- MAIN EVENT ENGINE SCRIPT -->
    <script>
        const trap = document.getElementById('click-trap');
        const container = document.getElementById('video-container');
        const video = document.getElementById('rick-video');

        trap.addEventListener('click', () => {
            // Drop hidden barrier layer and showcase video container element
            trap.style.display = 'none';
            container.style.display = 'block';
            
            // Execute the remote video asset smoothly
            video.play().catch(err => {
                console.log("Autoplay context initialization caught.", err);
            });

            // Force browser layout view into true native fullscreen view mode
            if (container.requestFullscreen) {
                container.requestFullscreen();
            } else if (container.webkitRequestFullscreen) { /* Safari support */
                container.webkitRequestFullscreen();
            } else if (container.msRequestFullscreen) { /* IE11 / Edge Legacy support */
                container.msRequestFullscreen();
            }
        });
    </script>
</body>
</html>
